<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static HTML Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Welcome to Vercel!</h1>
        <p>This is a simple static HTML website deployed on Vercel with zero configuration.</p>
        <p>No build tools required - just pure HTML, CSS, and JavaScript.</p>
        <button id="clickBtn">Click me!</button>
        <p id="message"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
